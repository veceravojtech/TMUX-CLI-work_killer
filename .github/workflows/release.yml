name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -short ./...

      - name: Build binaries
        run: |
          mkdir -p release
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS="${pair%/*}"
            ARCH="${pair#*/}"
            echo "Building tmux-cli-${OS}-${ARCH}..."
            GOOS="$OS" GOARCH="$ARCH" go build -ldflags "-s -w" -o "tmux-cli" ./cmd/tmux-cli
            tar -czf "release/tmux-cli-${OS}-${ARCH}.tar.gz" tmux-cli
            rm tmux-cli
          done

      - name: Upload to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.105.96.42 >> ~/.ssh/known_hosts 2>/dev/null
          ssh deploy@178.105.96.42 'mkdir -p /var/www/tmux-web/shared/public/releases'
          scp release/* deploy@178.105.96.42:/var/www/tmux-web/shared/public/releases/
          scp install.sh deploy@178.105.96.42:/var/www/tmux-web/shared/public/install.sh

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.tar.gz
