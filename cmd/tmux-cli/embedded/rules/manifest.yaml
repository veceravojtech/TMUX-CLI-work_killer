# Rule-pack manifest — consumed by `tmux-cli rules resolve` (internal/rules).
#
# Two file kinds per pack:
#   conventions: — BINDING planner conventions (loaded by task-plan-generate's
#                  <conventions> block; bodies were extracted verbatim from it)
#   code_rules:  — code rules for spec/implementation/review agents
#                  (previo-style catalogue; see SCHEMA.md)
#
# `when` is a structured condition (no expression language):
#   run_target: docker|local      — from test-environment.md "Run Target"
#   has_database: true|false      — from test-environment.md "Test Database"
#   has_frontend: true|false      — from test-environment.md "Playwright Status"
#   frontend_mode: vue|twig|none  — derived per-frontend-mode signal (goal-034);
#                                   stack-style: must be KNOWN to match
#   min_auth_flows: N             — from cross-cutting.md "## Auth Flows"
#   lang / framework: slug        — --lang/--framework flags (discovery state),
#                                   else project manifests (composer.json, go.mod, ...)
# Omitted when ⇒ always.
#
# Matching asymmetry (deliberate): capability signals (run_target,
# has_database, has_frontend, min_auth_flows) that are UNKNOWN match
# conservatively — the pack loads with a warning, because a missing safety
# convention is worse than an extra one. Stack signals (lang, framework) must
# be KNOWN to match — wrong-stack code rules misdirect rather than protect.
#
# Project-local rules: .tmux-cli/rules/local/conventions/*.md and
# .tmux-cli/rules/local/code-rules/* are always included and never touched by
# setup. See SCHEMA.md.

version: 1
packs:
  - id: _base
    conventions:
      - command-execution.md
      - goal-structure.md

  - id: docker
    when: { run_target: docker }
    conventions:
      - runtime-frontload.md

  - id: database
    when: { has_database: true }
    conventions:
      - ensure-stack.md
      - e2e-environment.md
      - e2e-side-effects.md
      - e2e-data-isolation.md

  - id: frontend
    when: { frontend_mode: vue }
    conventions:
      - node-tooling.md
      - e2e-artifacts.md

  - id: frontend-auth
    when: { frontend_mode: vue, min_auth_flows: 1 }
    conventions:
      - e2e-auth-state.md

  # vue pack: a Vue SPA front-end. conventions (SFC structure, naming) PLUS an
  # automated code_rules catalogue — e.g. VUE-PROP-001 (is/has/can-prefixed
  # boolean props, default false). Gated on frontend_mode: vue.
  - id: vue
    when: { frontend_mode: vue }
    conventions:
      - conventions.md
    code_rules:
      - code-rules.yaml

  # twig pack: a server-rendered Twig front-end. conventions-ONLY (no code_rules)
  # — there is no SPA build/test surface to lint. Gated on frontend_mode: twig.
  - id: twig
    when: { frontend_mode: twig }
    conventions:
      - conventions.md

  - id: php
    when: { lang: php }
    code_rules:
      - code-rules.yaml

  # php-symfony pack: a P2 multi-package DDD monorepo (contexts/**, projects/**,
  # packages/**), NOT a flat src/<BC> skeleton. The conventions describe the layout:
  #   monorepo-layout — contexts/<bc>/src/{Domain,Application}; Bundle/ IS the
  #     infrastructure layer (the only layer touching Doctrine/MySQL); app/ is the
  #     framework entry-point (controllers/CLI/processors).
  #   context-layers  — the Domain <- Application <- Bundle <- app dependency chain.
  #   shared-kernel   — contexts/previo/src: the only legal cross-context contract.
  #   app-layer       — contexts/<bc>/app: thin framework adapters, no business logic.
  # code_rules glob onto contexts/** / projects/** / packages/** (e.g. PHP-TYPE-003,
  # the automated Assert\Uuid|Assert::uuid UUID-type check).
  - id: php-symfony
    when: { lang: php, framework: symfony }
    conventions:
      - monorepo-layout.md
      - context-layers.md
      - shared-kernel.md
      - app-layer.md
      - security.md
    code_rules:
      - code-rules.yaml
