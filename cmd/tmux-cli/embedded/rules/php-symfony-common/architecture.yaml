# Pack: php-symfony-common — architecture rules shared by EVERY Symfony
# architecture profile (category: architecture). Loaded for lang=php,
# framework=symfony regardless of the architecture signal: these rules hold in
# a flat basic app exactly as in a multi-package DDD monorepo. The DDD-only
# architecture rules live in ../php-symfony/architecture-ddd.yaml.
#
# Path globs use the {src}/{infra} discovery tokens (see ../SCHEMA.md): {src}
# expands to every resolved source root, {infra} to the infra-layer directory
# name. In a multi-package DDD monorepo a `## Layers` doc resolves {src} to
# contexts/*/src, contexts/*/app/src, projects/*/src, packages/*/src and
# {infra} to Bundle; a flat app keeps the greenfield default src/Infrastructure.

- id: PHP-ARCH-001
  category: architecture
  scope: generic
  severity: must
  title: "No business logic in views/templates — push it into the service/domain"
  rule: >
    Twig templates and view-layer classes contain no business rules. Compute
    the decision in the domain/service and expose a simple accessor.
  why: >
    Logic in views is untestable and duplicates per template; the model stays
    the single source of truth.
  adapted_from: "PHP-ARCH-001"
  applies_to:
    - "**/templates/**/*.twig"
    - "{src}/**/View/**/*.php"
  detect:
    - "conditional business rules computed inside a template"
  fix: >
    Move the computation into the domain/service; the view reads one accessor.
  autofix: structural
  acceptance:
    - "GIVEN a view/template THEN it contains no business conditionals"
  validate:
    - "review: changed templates/views contain no business logic"
  validate_kind: review
  phase: application

- id: PHP-ARCH-005
  category: architecture
  scope: generic
  severity: should
  title: "Don't add an interface or async message bus when a synchronous call suffices"
  rule: >
    No single-implementation interface and no async bus hop for a call that is
    inherently synchronous. Add the seam when a second implementation or a
    real async need exists.
  why: >
    Needless indirection adds files and cognitive load with no benefit.
  adapted_from: "PHP-ARCH-005"
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a new interface with exactly one implementation and no test double need"
    - "a message dispatched async where the caller awaits the outcome"
  fix: >
    Call the service directly; drop the interface/bus indirection.
  autofix: structural
  acceptance:
    - "GIVEN a synchronous use case THEN no speculative interface or bus hop wraps it"
  validate:
    - "review: no speculative interfaces or async hops introduced in the diff"
  validate_kind: review
  phase: application

- id: PHP-ARCH-006
  category: architecture
  scope: generic
  severity: should
  title: "Module root holds only controllers; one controller per resource, support classes in a subfolder"
  rule: >
    In a feature module the root contains only *Controller.php. Each REST
    resource gets its own thin controller; that resource's Request/Response/
    Command DTOs and helpers live in a matching subfolder.
  why: >
    Keeps the module root navigable; one fat controller serving two resources
    tangles unrelated concerns.
  adapted_from: "PHP-ARCH-006"
  applies_to:
    - "{src}/*/*Controller.php"
    - "{src}/*/*Request.php"
    - "{src}/*/*Response.php"
  detect:
    - "Request/Response/Command DTOs loose in a module root"
    - "one controller exposing actions for two distinct resources"
  fix: >
    Split per resource; move support classes into a folder named after the
    resource; leave only controllers at the root.
  autofix: structural
  acceptance:
    - "GIVEN a module root THEN it holds only controllers; support classes sit in resource subfolders"
    - "GIVEN a controller THEN it serves a single resource"
  validate:
    - "review: module roots in the diff hold only *Controller.php; DTOs live in resource subfolders"
    - "review: each changed controller serves exactly one resource"
  validate_kind: review
  phase: application

- id: PHP-ARCH-010
  category: architecture
  scope: generic
  severity: must
  title: "A class's namespace mirrors its directory path under the resolved root namespace"
  rule: >
    Every class's namespace mirrors its directory path under the project's
    resolved root namespace (the PSR-4 vendor prefix discovered from composer.json
    autoload / docs/architecture/layout.md; App\ only as the greenfield default).
    A file at <root>/<A>/<B>/Foo.php is namespaced <RootNs>\<A>\<B>; the prefix is
    never hardcoded.
  why: >
    PSR-4 autoloading binds the root namespace to a directory and each sub-namespace
    to a subdirectory; a namespace that does not mirror its path silently fails to
    autoload and a hardcoded vendor prefix misdirects every other project.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a class whose namespace does not mirror its directory path under the resolved root"
    - "a hardcoded vendor/root prefix that ignores the project's PSR-4 root"
  fix: >
    Align the namespace to the file's path under the resolved PSR-4 root (or move
    the file); never hardcode the vendor prefix.
  autofix: structural
  acceptance:
    - "GIVEN a class THEN its namespace mirrors its directory path under the resolved root namespace"
  validate:
    - "composer dump-autoload --strict-psr"
    - "review: changed classes' namespaces mirror their directory path under the resolved root namespace"
  validate_kind: mixed
  phase: architecture
