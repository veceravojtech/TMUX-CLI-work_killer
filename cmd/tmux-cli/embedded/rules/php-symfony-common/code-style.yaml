# Pack: php-symfony — code-style rules (category: code-style).
# Split per-category from the former code-rules.yaml monolith. See ../SCHEMA.md.
#
# The ECS/code-style quality gate: a configured, available tool surfaced via the
# portable `vendor/bin/ecs check` (the project's resolved code-style entrypoint;
# `composer mono:cs-check` is an illustrative monorepo entrypoint) that goal validate-generation must
# surface alongside phpstan (analysis.yaml) and the manifest schema (scaffold.yaml)
# — it was previously undeclared, so `rules resolve` never emitted it into goal validates.

- id: PHP-STYLE-002
  category: code-style
  scope: generic
  severity: must
  title: "PHP changes are ECS-clean — code style passes the project's Easy Coding Standard"
  rule: >
    Every changed PHP file conforms to the project's Easy Coding Standard
    ruleset (ecs.php). Whenever PHP is added or changed, the ECS gate runs and
    must exit 0 before the change is committed.
  why: >
    ECS is a configured, available quality gate; leaving it undeclared lets
    code-style violations pass goal validation and reach the trunk, caught only
    by a post-hoc manual be-checks run (backend task 183).
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a changed .php file that ECS would reformat (vendor/bin/ecs check reports a diff)"
  fix: >
    Run vendor/bin/ecs check --fix (composer mono:cs-fix) and commit the formatted
    result until vendor/bin/ecs check exits 0.
  autofix: safe
  acceptance:
    - "GIVEN a changed PHP file THEN vendor/bin/ecs check exits 0"
  validate:
    - "vendor/bin/ecs check"
    - "review: the diff is code-style-clean via the project's resolved code-style entrypoint (`vendor/bin/ecs check`; `composer mono:cs-check` is an illustrative monorepo entrypoint) — no violations remain on the changed PHP paths"
  validate_kind: mixed
  phase: cross-cutting
