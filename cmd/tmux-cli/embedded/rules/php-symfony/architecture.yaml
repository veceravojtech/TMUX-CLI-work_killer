# Pack: php-symfony — architecture rules (category: architecture).
# Split per-category from the former code-rules.yaml monolith. See ../SCHEMA.md
# for the schema and the sibling convention docs (monorepo-layout.md,
# context-layers.md, shared-kernel.md, app-layer.md) for the layer contract
# these rules enforce point-wise.
#
# Path globs use the {src}/{infra} discovery tokens (see ../SCHEMA.md): {src}
# expands to every resolved source root, {infra} to the infra-layer directory
# name. For the P2 monorepo topology a `## Layers` doc resolves {src} to
# contexts/*/src, contexts/*/app/src, projects/*/src, packages/*/src and {infra}
# to Bundle. Tokenizing COLLAPSES the former context-vs-project glob distinction
# (contexts/*/src/**/*Handler.php and projects/*/src/... both become {src}/...);
# this is intentional — the goal is portability (rules match the real tree), and
# deptrac remains the authoritative boundary enforcer for the mixed rules.

- id: PHP-ARCH-001
  category: architecture
  scope: generic
  severity: must
  title: "No business logic in views/templates — push it into the service/domain"
  rule: >
    Twig templates and view-layer classes contain no business rules. Compute
    the decision in the domain/service and expose a simple accessor.
  why: >
    Logic in views is untestable and duplicates per template; the model stays
    the single source of truth.
  adapted_from: "PHP-ARCH-001"
  applies_to:
    - "**/templates/**/*.twig"
    - "{src}/**/View/**/*.php"
  detect:
    - "conditional business rules computed inside a template"
  fix: >
    Move the computation into the domain/service; the view reads one accessor.
  autofix: structural
  acceptance:
    - "GIVEN a view/template THEN it contains no business conditionals"
  validate:
    - "review: changed templates/views contain no business logic"
  validate_kind: review
  phase: application

- id: PHP-ARCH-002
  category: architecture
  scope: generic
  severity: must
  title: "Handlers live in the Application layer; handler method is `handle`"
  rule: >
    Command/query handlers belong in contexts/<bc>/src/Application/; the handler
    entry method is named handle().
  why: >
    Consistent placement and naming is how the wiring (and readers) find
    handlers; it keeps Domain free of orchestration.
  adapted_from: "PHP-ARCH-002"
  applies_to:
    - "{src}/**/*Handler.php"
  detect:
    - "a *Handler class outside */Application/*"
    - "handler entry method not named handle"
  fix: >
    Move the handler under contexts/<bc>/src/Application/ and rename its method
    to handle.
  autofix: structural
  acceptance:
    - "GIVEN a handler THEN it lives in the Application layer and exposes handle()"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: changed handlers expose a single handle() entry method"
  validate_kind: mixed
  phase: application

- id: PHP-ARCH-003
  category: architecture
  scope: generic
  severity: should
  title: "A domain query returns an aggregate, not a DTO"
  rule: >
    Domain repository/query methods return aggregates (domain objects). DTO
    mapping happens at the application/presentation boundary.
  why: >
    The aggregate keeps behaviour and invariants attached to the data; a DTO
    from the domain strands them.
  adapted_from: "PHP-ARCH-003"
  applies_to:
    - "{src}/Domain/**/*.php"
  detect:
    - "a Domain repository method typed to return a *DTO"
  fix: >
    Return the aggregate; map to DTO in the Application query service.
  autofix: structural
  acceptance:
    - "GIVEN a domain query THEN it returns an aggregate, not a DTO"
  validate:
    - "review: changed Domain repositories return aggregates, not DTOs"
  validate_kind: review
  phase: application

- id: PHP-ARCH-004
  category: architecture
  scope: generic
  severity: should
  title: "Persist through a domain repository, don't scatter persistence calls"
  rule: >
    Mutations go through the module's domain repository interface (explicit,
    intent-named save methods). Controllers/handlers never call the
    EntityManager or other persistence APIs directly.
  why: >
    One seam to change how data is stored; callers stay storage-agnostic.
  adapted_from: "PHP-ARCH-004"
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "EntityManager/persist/flush called from a controller or handler"
  fix: >
    Add/extend the domain repository interface and call it from the handler.
  autofix: structural
  acceptance:
    - "GIVEN a mutation THEN it flows through the domain repository, not direct persistence calls"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: no direct EntityManager use outside Infrastructure in the diff"
  validate_kind: mixed
  phase: application

- id: PHP-ARCH-005
  category: architecture
  scope: generic
  severity: should
  title: "Don't add an interface or async message bus when a synchronous call suffices"
  rule: >
    No single-implementation interface and no async bus hop for a call that is
    inherently synchronous. Add the seam when a second implementation or a
    real async need exists.
  why: >
    Needless indirection adds files and cognitive load with no benefit.
  adapted_from: "PHP-ARCH-005"
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a new interface with exactly one implementation and no test double need"
    - "a message dispatched async where the caller awaits the outcome"
  fix: >
    Call the service directly; drop the interface/bus indirection.
  autofix: structural
  acceptance:
    - "GIVEN a synchronous use case THEN no speculative interface or bus hop wraps it"
  validate:
    - "review: no speculative interfaces or async hops introduced in the diff"
  validate_kind: review
  phase: application

- id: PHP-ARCH-006
  category: architecture
  scope: generic
  severity: should
  title: "Module root holds only controllers; one controller per resource, support classes in a subfolder"
  rule: >
    In a feature module the root contains only *Controller.php. Each REST
    resource gets its own thin controller; that resource's Request/Response/
    Command DTOs and helpers live in a matching subfolder.
  why: >
    Keeps the module root navigable; one fat controller serving two resources
    tangles unrelated concerns.
  adapted_from: "PHP-ARCH-006"
  applies_to:
    - "{src}/*/*Controller.php"
    - "{src}/*/*Request.php"
    - "{src}/*/*Response.php"
  detect:
    - "Request/Response/Command DTOs loose in a module root"
    - "one controller exposing actions for two distinct resources"
  fix: >
    Split per resource; move support classes into a folder named after the
    resource; leave only controllers at the root.
  autofix: structural
  acceptance:
    - "GIVEN a module root THEN it holds only controllers; support classes sit in resource subfolders"
    - "GIVEN a controller THEN it serves a single resource"
  validate:
    - "review: module roots in the diff hold only *Controller.php; DTOs live in resource subfolders"
    - "review: each changed controller serves exactly one resource"
  validate_kind: review
  phase: application

- id: PHP-ARCH-007
  category: architecture
  scope: generic
  severity: must
  title: "Respect package/context boundaries — no upward-layer or cross-context-internal dependency"
  rule: >
    A package depends only in the allowed direction. Within a context the layers
    go Domain ← Application ← Bundle ← app (a lower layer never imports a higher
    one); across packages a context never reaches into another context's internal
    Domain/Application — only its shared-kernel contracts. deptrac enforces both
    the layer direction and the package edges.
  why: >
    The package/layer graph is the architecture; an upward or cross-internal edge
    couples what must stay independently buildable and deployable.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a lower layer importing a higher layer (Domain using Application/Bundle)"
    - "a package importing another package's internal namespace, not its contract"
  fix: >
    Invert the dependency (inject an interface owned by the lower layer) or route
    the cross-package call through a shared-kernel contract; rerun deptrac.
  autofix: structural
  acceptance:
    - "GIVEN the changed packages THEN deptrac reports no layer or package-boundary violation"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: changed code respects package/context boundaries (no upward layer or cross-context-internal dependency)"
  validate_kind: mixed
  phase: architecture

- id: PHP-ARCH-008
  category: architecture
  scope: generic
  severity: must
  title: "No import or injection of another context's concrete Domain/Application class"
  rule: >
    A context never imports, injects, or instantiates another context's concrete
    Domain or Application class. Cross-context collaboration goes through a
    published contract from the shared kernel (see PHP-ARCH-009), so the foreign
    context's internals stay private and replaceable.
  why: >
    A concrete cross-context import welds two contexts together; the next refactor
    in one breaks the other, defeating the bounded-context split.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a use/import of another context's concrete Domain/Application namespace"
    - "constructor injection typed to a foreign context's concrete service"
  fix: >
    Depend on the foreign context's shared-kernel contract interface and inject
    that instead of the concrete class.
  autofix: structural
  acceptance:
    - "GIVEN a cross-context dependency THEN it targets a shared contract, not a foreign concrete class"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: no import/inject of another context's concrete Domain/Application class"
  validate_kind: mixed
  phase: architecture

- id: PHP-ARCH-009
  category: architecture
  scope: generic
  severity: should
  title: "Cross-context reads go through a published query contract, not a foreign service"
  rule: >
    When one context needs another context's data, it consumes a published
    XxxQueryContract/XxxContract from the shared kernel (contexts/previo/src) and
    receives contract-typed result objects — never a foreign concrete query
    service or DTO.
  why: >
    Reading through the contract keeps the consumer decoupled from the producer's
    internal shape; the producer can change its query service without a ripple.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a consumer context typing against a foreign concrete query service or result DTO"
  fix: >
    Inject the shared XxxQueryContract; type results as the XxxContract interface.
  autofix: structural
  acceptance:
    - "GIVEN a cross-context read THEN it flows through a published query contract, not a foreign service"
  validate:
    - "review: cross-context reads go through a published XxxQueryContract/XxxContract, not a foreign concrete service"
  validate_kind: review
  phase: architecture

- id: PHP-ARCH-010
  category: architecture
  scope: generic
  severity: must
  title: "A class's namespace mirrors its directory path under the resolved root namespace"
  rule: >
    Every class's namespace mirrors its directory path under the project's
    resolved root namespace (the PSR-4 vendor prefix discovered from composer.json
    autoload / docs/architecture/layout.md; App\ only as the greenfield default).
    A file at <root>/<A>/<B>/Foo.php is namespaced <RootNs>\<A>\<B>; the prefix is
    never hardcoded.
  why: >
    PSR-4 autoloading binds the root namespace to a directory and each sub-namespace
    to a subdirectory; a namespace that does not mirror its path silently fails to
    autoload and a hardcoded vendor prefix misdirects every other project.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a class whose namespace does not mirror its directory path under the resolved root"
    - "a hardcoded vendor/root prefix that ignores the project's PSR-4 root"
  fix: >
    Align the namespace to the file's path under the resolved PSR-4 root (or move
    the file); never hardcode the vendor prefix.
  autofix: structural
  acceptance:
    - "GIVEN a class THEN its namespace mirrors its directory path under the resolved root namespace"
  validate:
    - "composer dump-autoload --strict-psr"
    - "review: changed classes' namespaces mirror their directory path under the resolved root namespace"
  validate_kind: mixed
  phase: architecture

- id: PHP-ARCH-011
  category: architecture
  scope: generic
  severity: must
  title: "Framework entry points live in the resolved entry/app layer, not the domain/application library"
  rule: >
    A framework entry point — a controller, CLI command, message consumer/processor,
    event listener, or external-system adapter — lives in the project's resolved
    framework entry-point layer (the app layer: contexts/<bc>/app or
    projects/<app>/src in the P2 monorepo; the entry location resolved from
    discovery / the generated skeleton for other layouts — ASK when unknown), never
    inside the pure domain/application library (contexts/<bc>/src Domain/Application).
    That app layer is the only layer permitted to use framework attributes
    (#[Route], #[AsCommand], #[AsMessageProcessor], …); Domain/Application stay
    framework-free.
  why: >
    An entry point in the library layer drags HTTP/CLI/messaging framework
    dependencies into code that must stay framework-free and independently testable,
    breaking the layer contract and the bounded-context split.
  applies_to:
    - "{src}/**/*Controller.php"
    - "{src}/**/*CliCommand.php"
  detect:
    - "a controller, CLI command, message processor/listener, or external adapter defined under the pure domain/application library (contexts/<bc>/src Domain/Application) instead of the resolved entry/app layer"
    - "a framework attribute (#[Route], #[AsCommand], #[AsMessageProcessor]) on a class outside the entry/app layer"
  fix: >
    Move the entry point to the project's resolved entry/app layer
    (contexts/<bc>/app or projects/<app>/src); leave only framework-free
    domain/application code in the context library.
  autofix: structural
  acceptance:
    - "GIVEN a framework entry point THEN it lives in the resolved entry/app layer, not the pure domain/application library"
  validate:
    - "review: changed framework entry points (controllers, CLI commands, consumers, listeners, adapters) live in the resolved entry/app layer, not the pure domain/application library"
  validate_kind: review
  phase: architecture

- id: PHP-ARCH-012
  category: architecture
  scope: generic
  severity: must
  title: "Domain-event payloads evolve additively only — add fields, never remove or rename"
  rule: >
    A published domain event's payload is a backward-compatible contract: a change
    may evolve it additively — adding optional fields — but must never remove,
    rename, or retype an existing field, because downstream consumers bind to the
    published shape. When a breaking change is unavoidable, version the event by
    introducing a new event type and leave existing consumers on the old one.
  why: >
    Events are a published language; a non-additive payload change silently breaks
    every consumer deserializing the old shape — a runtime failure no producer-side
    test catches.
  applies_to:
    - "{src}/**/*Event.php"
    - "{src}/**/Event/**/*.php"
  detect:
    - "an existing payload field removed, renamed, or retyped on a published event"
    - "a required (non-optional) field added to an event already in use"
  fix: >
    Restore the removed/renamed field (keep the change additive) or introduce a new
    versioned event type for the breaking shape; leave old consumers on the old event.
  autofix: structural
  acceptance:
    - "GIVEN a change to a published domain event THEN the payload change is additive — no field removed, renamed, or retyped"
  validate:
    - "review: changed domain events evolve their payload additively (fields added only; none removed, renamed, or retyped)"
  validate_kind: review
  phase: architecture

- id: PHP-ARCH-013
  category: architecture
  scope: generic
  severity: must
  title: "A domain event carries a readonly state-snapshot record, not the whole aggregate"
  rule: >
    A domain event's payload is a readonly state-snapshot record of the relevant
    aggregate state at emission time — a flat, immutable value object (a 'state
    snapshot record', e.g. a *EventRecord, naming illustrative only) — never the
    live aggregate object, its entities, or its repository-bound references.
  why: >
    Embedding the aggregate leaks mutable internal structure into the published
    language and couples consumers to the producer's domain model; a readonly
    snapshot keeps the event a stable, serializable contract.
  applies_to:
    - "{src}/**/*Event.php"
    - "{src}/**/Event/**/*.php"
  detect:
    - "an event constructor or property typed to an aggregate root or Doctrine entity"
    - "an event exposing the live aggregate instead of a flat readonly record"
  fix: >
    Replace the aggregate reference with a readonly snapshot record holding only the
    fields consumers need (role: 'state snapshot record', e.g. a *EventRecord); copy
    values at emission time.
  autofix: structural
  acceptance:
    - "GIVEN a domain event THEN its payload is a readonly state-snapshot record, not the full aggregate object"
  validate:
    - "review: changed domain events carry a readonly state-snapshot record (role: 'state snapshot record', e.g. *EventRecord), never the full aggregate"
  validate_kind: review
  phase: architecture

- id: PHP-ARCH-014
  category: architecture
  scope: generic
  severity: should
  title: "An infra repository implementation states its storage technology in its name"
  rule: >
    A concrete repository implementation in the infrastructure ({infra}/Bundle)
    layer — one that implements a domain RepositoryInterface or an Application
    query-repository interface and is the only layer binding to Doctrine/MySQL/a
    storage SDK — names the storage technology it binds to, so one interface's
    competing implementations (a real persistence one vs an in-memory test double)
    are distinguishable at a glance and the technology is explicit at wiring.
    Concrete suffixes (e.g. Doctrine*Repository, Mysql*Repository,
    Mysql*QueryRepository) are illustrative only; resolve the project's actual
    vocabulary from discovery. The domain repository INTERFACE itself names the
    concept, not the technology — this rule binds only implementations in the
    infra layer.
  why: >
    A tech-anonymous infra implementation name hides which storage it binds to and
    collides with in-memory doubles of the same interface; stating the technology
    keeps the binding explicit and the seam reviewable.
  applies_to:
    - "{src}/{infra}/**/*Repository.php"
  detect:
    - "a concrete repository implementation in the infra layer whose name does not state the storage technology it binds to"
    - "two implementations of one repository interface indistinguishable by name"
  fix: >
    Rename the infra implementation to state its storage technology (illustrative:
    Doctrine…Repository / Mysql…QueryRepository); leave the domain interface
    concept-named.
  autofix: structural
  acceptance:
    - "GIVEN an infra-layer repository implementation THEN its name states the storage technology it binds to"
  validate:
    - "review: changed infra-layer repository implementations state their storage technology in the class name (illustrative: Doctrine*Repository / Mysql*QueryRepository), resolved from project vocabulary"
  validate_kind: review
  phase: architecture

- id: PHP-ARCH-015
  category: architecture
  scope: generic
  severity: should
  title: "Application use cases name their role — command handler (write) vs query service (read)"
  rule: >
    An Application-layer use case names its role so the write/read split is legible
    from the class name: a command (write) use case is a handler and a query (read)
    use case is a query service implementing a published query contract. Concrete
    suffixes (e.g. a *Handler for the command side, a *QueryService implementing a
    *QueryContract for the read side) are illustrative only; resolve the project's
    actual vocabulary from discovery. Phrased by role, not suffix — a name that
    hides whether a class reads or writes violates the rule.
  why: >
    Distinct role-naming makes the CQRS read/write split self-evident in the file
    tree and at call sites; an ambiguous name forces readers to open the class to
    learn whether it mutates or only reads.
  applies_to:
    - "{src}/**/Application/**/*.php"
  detect:
    - "a write (command) use case not named as a handler"
    - "a read (query) use case not named as a query service"
    - "an Application use case whose name does not reveal its read-vs-write role"
  fix: >
    Rename the use case to state its role (illustrative: …Handler for the command
    side, …QueryService implementing a …QueryContract for the read side).
  autofix: structural
  acceptance:
    - "GIVEN an Application command use case THEN its name states the handler (write) role"
    - "GIVEN an Application query use case THEN its name states the query-service (read) role"
  validate:
    - "review: changed Application use cases name their role — command handler (write, illustrative *Handler) vs query service (read, illustrative *QueryService impl *QueryContract), resolved from project vocabulary"
  validate_kind: review
  phase: architecture
