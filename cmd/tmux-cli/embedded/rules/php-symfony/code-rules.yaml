# Pack: php-symfony — Symfony DDD code rules.
# Audience: spec/implementation/review agents (kind: code-rules). Loaded on
# top of the php pack when FRAMEWORK == symfony. See ../SCHEMA.md for the
# schema; see ddd-conventions.md (same pack) for the layer contract these
# rules enforce point-wise.
#
# Adapted from a production house-rules catalogue grown out of real MR review
# feedback (adapted_from records the source rule ID); provenance identifiers
# are intentionally not embedded. Path globs target the generated DDD skeleton
# (src/<BC>/<Layer>/...).

- id: PHP-ARCH-001
  category: architecture
  scope: generic
  severity: must
  title: "No business logic in views/templates — push it into the service/domain"
  rule: >
    Twig templates and view-layer classes contain no business rules. Compute
    the decision in the domain/service and expose a simple accessor.
  why: >
    Logic in views is untestable and duplicates per template; the model stays
    the single source of truth.
  adapted_from: "PHP-ARCH-001"
  applies_to:
    - "templates/**/*.twig"
    - "src/**/View/**/*.php"
  detect:
    - "conditional business rules computed inside a template"
  fix: >
    Move the computation into the domain/service; the view reads one accessor.
  autofix: structural
  acceptance:
    - "GIVEN a view/template THEN it contains no business conditionals"
  validate:
    - "review: changed templates/views contain no business logic"
  validate_kind: review
  phase: application

- id: PHP-ARCH-002
  category: architecture
  scope: generic
  severity: must
  title: "Handlers live in the Application layer; handler method is `handle`"
  rule: >
    Command/query handlers belong in src/<BC>/Application/; the handler entry
    method is named handle().
  why: >
    Consistent placement and naming is how the wiring (and readers) find
    handlers; it keeps Domain free of orchestration.
  adapted_from: "PHP-ARCH-002"
  applies_to:
    - "src/**/*Handler.php"
  detect:
    - "a *Handler class outside */Application/*"
    - "handler entry method not named handle"
  fix: >
    Move the handler under src/<BC>/Application/ and rename its method to handle.
  autofix: structural
  acceptance:
    - "GIVEN a handler THEN it lives in the Application layer and exposes handle()"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: changed handlers expose a single handle() entry method"
  validate_kind: mixed
  phase: application

- id: PHP-ARCH-003
  category: architecture
  scope: generic
  severity: should
  title: "A domain query returns an aggregate, not a DTO"
  rule: >
    Domain repository/query methods return aggregates (domain objects). DTO
    mapping happens at the application/presentation boundary.
  why: >
    The aggregate keeps behaviour and invariants attached to the data; a DTO
    from the domain strands them.
  adapted_from: "PHP-ARCH-003"
  applies_to:
    - "src/**/Domain/**/*.php"
  detect:
    - "a Domain repository method typed to return a *DTO"
  fix: >
    Return the aggregate; map to DTO in the Application query service.
  autofix: structural
  acceptance:
    - "GIVEN a domain query THEN it returns an aggregate, not a DTO"
  validate:
    - "review: changed Domain repositories return aggregates, not DTOs"
  validate_kind: review
  phase: application

- id: PHP-ARCH-004
  category: architecture
  scope: generic
  severity: should
  title: "Persist through a domain repository, don't scatter persistence calls"
  rule: >
    Mutations go through the module's domain repository interface (explicit,
    intent-named save methods). Controllers/handlers never call the
    EntityManager or other persistence APIs directly.
  why: >
    One seam to change how data is stored; callers stay storage-agnostic.
  adapted_from: "PHP-ARCH-004"
  applies_to:
    - "src/**/*.php"
  detect:
    - "EntityManager/persist/flush called from a controller or handler"
  fix: >
    Add/extend the domain repository interface and call it from the handler.
  autofix: structural
  acceptance:
    - "GIVEN a mutation THEN it flows through the domain repository, not direct persistence calls"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: no direct EntityManager use outside Infrastructure in the diff"
  validate_kind: mixed
  phase: application

- id: PHP-ARCH-005
  category: architecture
  scope: generic
  severity: should
  title: "Don't add an interface or async message bus when a synchronous call suffices"
  rule: >
    No single-implementation interface and no async bus hop for a call that is
    inherently synchronous. Add the seam when a second implementation or a
    real async need exists.
  why: >
    Needless indirection adds files and cognitive load with no benefit.
  adapted_from: "PHP-ARCH-005"
  applies_to:
    - "src/**/*.php"
  detect:
    - "a new interface with exactly one implementation and no test double need"
    - "a message dispatched async where the caller awaits the outcome"
  fix: >
    Call the service directly; drop the interface/bus indirection.
  autofix: structural
  acceptance:
    - "GIVEN a synchronous use case THEN no speculative interface or bus hop wraps it"
  validate:
    - "review: no speculative interfaces or async hops introduced in the diff"
  validate_kind: review
  phase: application

- id: PHP-ARCH-006
  category: architecture
  scope: generic
  severity: should
  title: "Module root holds only controllers; one controller per resource, support classes in a subfolder"
  rule: >
    In a feature module the root contains only *Controller.php. Each REST
    resource gets its own thin controller; that resource's Request/Response/
    Command DTOs and helpers live in a matching subfolder.
  why: >
    Keeps the module root navigable; one fat controller serving two resources
    tangles unrelated concerns.
  adapted_from: "PHP-ARCH-006"
  applies_to:
    - "src/**/*Controller.php"
    - "src/**/*Request.php"
    - "src/**/*Response.php"
  detect:
    - "Request/Response/Command DTOs loose in a module root"
    - "one controller exposing actions for two distinct resources"
  fix: >
    Split per resource; move support classes into a folder named after the
    resource; leave only controllers at the root.
  autofix: structural
  acceptance:
    - "GIVEN a module root THEN it holds only controllers; support classes sit in resource subfolders"
    - "GIVEN a controller THEN it serves a single resource"
  validate:
    - "review: module roots in the diff hold only *Controller.php; DTOs live in resource subfolders"
    - "review: each changed controller serves exactly one resource"
  validate_kind: review
  phase: application

- id: PHP-PERS-001
  category: persistence
  scope: generic
  severity: must
  title: "Persist via Doctrine entities, not raw array repositories"
  rule: >
    Persistence goes through mapped Doctrine entities. No repositories that
    read/write associative arrays against hand-written SQL for domain state.
  why: >
    Mapped entities carry types, identity, and migrations; array bags carry
    typos.
  adapted_from: "PHP-PERS-001"
  applies_to:
    - "src/**/Infrastructure/**/*.php"
  detect:
    - "repositories returning/accepting associative arrays for domain state"
  fix: >
    Map the entity and rewrite the repository against it.
  autofix: structural
  acceptance:
    - "GIVEN domain persistence THEN it uses mapped Doctrine entities"
  validate:
    - "review: changed repositories operate on mapped entities, not raw arrays"
  validate_kind: review
  phase: domain

- id: PHP-PERS-002
  category: persistence
  scope: generic
  severity: should
  title: "Map UUID columns as binary UUID, not string"
  rule: >
    UUID columns use the binary UUID Doctrine type (e.g. uuid/binaryUuid per
    the project's Doctrine stack), not VARCHAR(36).
  why: >
    Binary UUIDs are 16 bytes with index-friendly ordering; string UUIDs bloat
    indexes.
  adapted_from: "PHP-PERS-002"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "src/**/Infrastructure/**/*.php"
    - "src/**/Domain/**/*.php"
  detect:
    - "ORM column type string/varchar holding UUIDs"
  fix: >
    Switch the column mapping to the UUID type and migrate.
  autofix: structural
  acceptance:
    - "GIVEN a UUID column THEN its Doctrine type is the binary UUID type"
  validate:
    - "review: new UUID columns in the diff use the uuid Doctrine type"
  validate_kind: review
  phase: domain

- id: PHP-PERS-003
  category: persistence
  scope: generic
  severity: must
  title: "Model collections as their own entity/table, not a JSON blob"
  rule: >
    A collection of structured child records (messages of a thread, items of
    an order) is its own mapped entity with a relation — never a JSON column
    on the parent.
  why: >
    JSON blobs can't be queried, indexed, migrated, or constrained; they decay
    into schema-less mud.
  adapted_from: "PHP-PERS-003"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "src/**/Domain/**/*.php"
    - "src/**/Infrastructure/**/*.php"
  detect:
    - "json ORM column holding an array of structured records"
  fix: >
    Extract the child entity + relation; migrate the blob.
  autofix: structural
  acceptance:
    - "GIVEN a structured collection THEN it is a mapped child entity, not a JSON column"
  validate:
    - "review: no new JSON columns holding structured collections in the diff"
  validate_kind: review
  phase: domain

- id: PHP-PERS-004
  category: persistence
  scope: generic
  severity: should
  title: "Map enum/value columns with a dedicated custom Doctrine DBAL type"
  rule: >
    Enum and value-object columns get a custom DBAL type that converts to/from
    the PHP type — not string columns converted ad hoc at every read site.
  why: >
    The DBAL type converts once, centrally; ad-hoc conversion scatters and
    drifts.
  adapted_from: "PHP-PERS-004"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "src/**/Infrastructure/**/*.php"
  detect:
    - "string columns + manual from()/value conversions around enum fields"
  fix: >
    Add a custom DBAL type and map the column with it.
  autofix: structural
  acceptance:
    - "GIVEN an enum/VO column THEN a custom DBAL type owns the conversion"
  validate:
    - "review: new enum/VO columns in the diff are mapped via custom DBAL types"
  validate_kind: review
  phase: domain

- id: PHP-CFG-001
  category: config
  scope: generic
  severity: must
  title: "Env vars belong in `.env` with dev defaults; secrets never committed"
  rule: >
    New configuration enters through env vars declared in the root .env with
    safe dev defaults; real secrets live in the deployment secret store /
    vault, never in committed files.
  why: >
    One declared surface for configuration; committed secrets are a breach,
    undeclared env vars are a 3am outage.
  adapted_from: "PHP-CFG-001"
  applies_to:
    - ".env"
    - ".env.test"
    - "config/**"
  detect:
    - "getenv/parameter access for a var not declared in .env"
    - "secret-looking literals in committed config"
  fix: >
    Declare the var in .env with a dev default; route the real value through
    the secret store.
  autofix: none
  acceptance:
    - "GIVEN a new env var THEN it is declared in .env with a dev default and no committed secret value"
  validate:
    - "review: new env vars declared in .env; no secret values committed in the diff"
  validate_kind: review
  phase: deployment

- id: PHP-I18N-001
  category: i18n
  scope: generic
  severity: must
  title: "User-facing strings come from translations; backend errors are translatable exceptions"
  rule: >
    User-visible text resolves through the translation catalogue (reuse
    existing keys before minting new ones). Backend user-facing errors are
    translatable exception types carrying a message key — not sprintf'd
    English.
  why: >
    Hardcoded strings can't be localized and fork per call site; translatable
    exceptions keep the boundary uniform.
  adapted_from: "PHP-I18N-001"
  applies_to:
    - "src/**/*.php"
    - "templates/**/*.twig"
  detect:
    - "literal user-facing strings in controllers/templates"
    - "user-facing exceptions built with sprintf/string concat"
  fix: >
    Move the string to the translation catalogue and reference the key; throw
    the translatable exception type.
  autofix: structural
  acceptance:
    - "GIVEN user-facing text THEN it resolves from the translation catalogue"
  validate:
    - "review: no hardcoded user-facing strings or sprintf'd user-facing exceptions in the diff"
  validate_kind: review
  phase: cross-cutting
