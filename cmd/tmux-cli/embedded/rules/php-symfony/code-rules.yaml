# Pack: php-symfony — Symfony DDD monorepo code rules.
# Audience: spec/implementation/review agents (kind: code-rules). Loaded on
# top of the php pack when FRAMEWORK == symfony. See ../SCHEMA.md for the
# schema; see monorepo-layout.md, context-layers.md, shared-kernel.md, and
# app-layer.md (same pack) for the layer contract these rules enforce
# point-wise.
#
# Adapted from a production house-rules catalogue grown out of real MR review
# feedback (adapted_from records the source rule ID); provenance identifiers
# are intentionally not embedded.
#
# Path globs use the {src}/{infra} discovery tokens (see ../SCHEMA.md): {src}
# expands to every resolved source root, {infra} to the infra-layer directory
# name. For the P2 monorepo topology a `## Layers` doc resolves {src} to
# contexts/*/src, contexts/*/app/src, projects/*/src, packages/*/src and {infra}
# to Bundle. Tokenizing COLLAPSES the former context-vs-project glob distinction
# (contexts/*/src/**/*Handler.php and projects/*/src/... both become {src}/...);
# this is intentional — the goal is portability (rules match the real tree), and
# deptrac remains the authoritative boundary enforcer for the mixed rules.
# PHP-MONO-001's component-manifest globs stay LITERAL (no source-root semantics).

- id: PHP-ARCH-001
  category: architecture
  scope: generic
  severity: must
  title: "No business logic in views/templates — push it into the service/domain"
  rule: >
    Twig templates and view-layer classes contain no business rules. Compute
    the decision in the domain/service and expose a simple accessor.
  why: >
    Logic in views is untestable and duplicates per template; the model stays
    the single source of truth.
  adapted_from: "PHP-ARCH-001"
  applies_to:
    - "templates/**/*.twig"
    - "{src}/**/View/**/*.php"
  detect:
    - "conditional business rules computed inside a template"
  fix: >
    Move the computation into the domain/service; the view reads one accessor.
  autofix: structural
  acceptance:
    - "GIVEN a view/template THEN it contains no business conditionals"
  validate:
    - "review: changed templates/views contain no business logic"
  validate_kind: review
  phase: application

- id: PHP-ARCH-002
  category: architecture
  scope: generic
  severity: must
  title: "Handlers live in the Application layer; handler method is `handle`"
  rule: >
    Command/query handlers belong in contexts/<bc>/src/Application/; the handler
    entry method is named handle().
  why: >
    Consistent placement and naming is how the wiring (and readers) find
    handlers; it keeps Domain free of orchestration.
  adapted_from: "PHP-ARCH-002"
  applies_to:
    - "{src}/**/*Handler.php"
  detect:
    - "a *Handler class outside */Application/*"
    - "handler entry method not named handle"
  fix: >
    Move the handler under contexts/<bc>/src/Application/ and rename its method
    to handle.
  autofix: structural
  acceptance:
    - "GIVEN a handler THEN it lives in the Application layer and exposes handle()"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: changed handlers expose a single handle() entry method"
  validate_kind: mixed
  phase: application

- id: PHP-ARCH-003
  category: architecture
  scope: generic
  severity: should
  title: "A domain query returns an aggregate, not a DTO"
  rule: >
    Domain repository/query methods return aggregates (domain objects). DTO
    mapping happens at the application/presentation boundary.
  why: >
    The aggregate keeps behaviour and invariants attached to the data; a DTO
    from the domain strands them.
  adapted_from: "PHP-ARCH-003"
  applies_to:
    - "{src}/Domain/**/*.php"
  detect:
    - "a Domain repository method typed to return a *DTO"
  fix: >
    Return the aggregate; map to DTO in the Application query service.
  autofix: structural
  acceptance:
    - "GIVEN a domain query THEN it returns an aggregate, not a DTO"
  validate:
    - "review: changed Domain repositories return aggregates, not DTOs"
  validate_kind: review
  phase: application

- id: PHP-ARCH-004
  category: architecture
  scope: generic
  severity: should
  title: "Persist through a domain repository, don't scatter persistence calls"
  rule: >
    Mutations go through the module's domain repository interface (explicit,
    intent-named save methods). Controllers/handlers never call the
    EntityManager or other persistence APIs directly.
  why: >
    One seam to change how data is stored; callers stay storage-agnostic.
  adapted_from: "PHP-ARCH-004"
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "EntityManager/persist/flush called from a controller or handler"
  fix: >
    Add/extend the domain repository interface and call it from the handler.
  autofix: structural
  acceptance:
    - "GIVEN a mutation THEN it flows through the domain repository, not direct persistence calls"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: no direct EntityManager use outside Infrastructure in the diff"
  validate_kind: mixed
  phase: application

- id: PHP-ARCH-005
  category: architecture
  scope: generic
  severity: should
  title: "Don't add an interface or async message bus when a synchronous call suffices"
  rule: >
    No single-implementation interface and no async bus hop for a call that is
    inherently synchronous. Add the seam when a second implementation or a
    real async need exists.
  why: >
    Needless indirection adds files and cognitive load with no benefit.
  adapted_from: "PHP-ARCH-005"
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a new interface with exactly one implementation and no test double need"
    - "a message dispatched async where the caller awaits the outcome"
  fix: >
    Call the service directly; drop the interface/bus indirection.
  autofix: structural
  acceptance:
    - "GIVEN a synchronous use case THEN no speculative interface or bus hop wraps it"
  validate:
    - "review: no speculative interfaces or async hops introduced in the diff"
  validate_kind: review
  phase: application

- id: PHP-ARCH-006
  category: architecture
  scope: generic
  severity: should
  title: "Module root holds only controllers; one controller per resource, support classes in a subfolder"
  rule: >
    In a feature module the root contains only *Controller.php. Each REST
    resource gets its own thin controller; that resource's Request/Response/
    Command DTOs and helpers live in a matching subfolder.
  why: >
    Keeps the module root navigable; one fat controller serving two resources
    tangles unrelated concerns.
  adapted_from: "PHP-ARCH-006"
  applies_to:
    - "{src}/*/*Controller.php"
    - "{src}/*/*Request.php"
    - "{src}/*/*Response.php"
  detect:
    - "Request/Response/Command DTOs loose in a module root"
    - "one controller exposing actions for two distinct resources"
  fix: >
    Split per resource; move support classes into a folder named after the
    resource; leave only controllers at the root.
  autofix: structural
  acceptance:
    - "GIVEN a module root THEN it holds only controllers; support classes sit in resource subfolders"
    - "GIVEN a controller THEN it serves a single resource"
  validate:
    - "review: module roots in the diff hold only *Controller.php; DTOs live in resource subfolders"
    - "review: each changed controller serves exactly one resource"
  validate_kind: review
  phase: application

- id: PHP-PERS-001
  category: persistence
  scope: generic
  severity: must
  title: "Persist via Doctrine entities, not raw array repositories"
  rule: >
    Persistence goes through mapped Doctrine entities. No repositories that
    read/write associative arrays against hand-written SQL for domain state.
  why: >
    Mapped entities carry types, identity, and migrations; array bags carry
    typos.
  adapted_from: "PHP-PERS-001"
  applies_to:
    - "{src}/{infra}/**/*.php"
    - "{src}/**/*Repository.php"
  detect:
    - "repositories returning/accepting associative arrays for domain state"
  fix: >
    Map the entity and rewrite the repository against it.
  autofix: structural
  acceptance:
    - "GIVEN domain persistence THEN it uses mapped Doctrine entities"
  validate:
    - "composer p2:db-validate"
    - "review: changed repositories operate on mapped entities, not raw arrays"
  validate_kind: mixed
  phase: domain

- id: PHP-PERS-002
  category: persistence
  scope: generic
  severity: should
  title: "Map UUID columns as binary UUID, not string"
  rule: >
    UUID columns use the binary UUID Doctrine type (e.g. uuid/binaryUuid per
    the project's Doctrine stack), not VARCHAR(36).
  why: >
    Binary UUIDs are 16 bytes with index-friendly ordering; string UUIDs bloat
    indexes.
  adapted_from: "PHP-PERS-002"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/{infra}/**/*.php"
    - "{src}/Domain/**/*.php"
    - "{src}/**/Entity/**/*.php"
  detect:
    - "ORM column type string/varchar holding UUIDs"
  fix: >
    Switch the column mapping to the UUID type and migrate.
  autofix: structural
  acceptance:
    - "GIVEN a UUID column THEN its Doctrine type is the binary UUID type"
  validate:
    - "composer p2:db-validate"
    - "review: new UUID columns in the diff use the uuid Doctrine type"
  validate_kind: mixed
  phase: domain

- id: PHP-PERS-003
  category: persistence
  scope: generic
  severity: must
  title: "Model collections as their own entity/table, not a JSON blob"
  rule: >
    A collection of structured child records (messages of a thread, items of
    an order) is its own mapped entity with a relation — never a JSON column
    on the parent.
  why: >
    JSON blobs can't be queried, indexed, migrated, or constrained; they decay
    into schema-less mud.
  adapted_from: "PHP-PERS-003"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/Domain/**/*.php"
    - "{src}/{infra}/**/*.php"
  detect:
    - "json ORM column holding an array of structured records"
  fix: >
    Extract the child entity + relation; migrate the blob.
  autofix: structural
  acceptance:
    - "GIVEN a structured collection THEN it is a mapped child entity, not a JSON column"
  validate:
    - "composer p2:db-validate"
    - "review: no new JSON columns holding structured collections in the diff"
  validate_kind: mixed
  phase: domain

- id: PHP-PERS-004
  category: persistence
  scope: generic
  severity: should
  title: "Map enum/value columns with a dedicated custom Doctrine DBAL type"
  rule: >
    Enum and value-object columns get a custom DBAL type that converts to/from
    the PHP type — not string columns converted ad hoc at every read site.
  why: >
    The DBAL type converts once, centrally; ad-hoc conversion scatters and
    drifts.
  adapted_from: "PHP-PERS-004"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/{infra}/**/*.php"
  detect:
    - "string columns + manual from()/value conversions around enum fields"
  fix: >
    Add a custom DBAL type and map the column with it.
  autofix: structural
  acceptance:
    - "GIVEN an enum/VO column THEN a custom DBAL type owns the conversion"
  validate:
    - "composer p2:db-validate"
    - "review: new enum/VO columns in the diff are mapped via custom DBAL types"
  validate_kind: mixed
  phase: domain

- id: PHP-CFG-001
  category: config
  scope: generic
  severity: must
  title: "Env vars belong in `.env` with dev defaults; secrets never committed"
  rule: >
    New configuration enters through env vars declared in the root .env with
    safe dev defaults; real secrets live in the deployment secret store /
    vault, never in committed files.
  why: >
    One declared surface for configuration; committed secrets are a breach,
    undeclared env vars are a 3am outage.
  adapted_from: "PHP-CFG-001"
  applies_to:
    - ".env"
    - ".env.test"
    - "config/**"
  detect:
    - "getenv/parameter access for a var not declared in .env"
    - "secret-looking literals in committed config"
  fix: >
    Declare the var in .env with a dev default; route the real value through
    the secret store.
  autofix: none
  acceptance:
    - "GIVEN a new env var THEN it is declared in .env with a dev default and no committed secret value"
  validate:
    - "composer p2:env-merge"
    - "review: new env vars declared in .env; no secret values committed in the diff"
  validate_kind: mixed
  phase: deployment

- id: PHP-I18N-001
  category: i18n
  scope: generic
  severity: must
  title: "User-facing strings come from translations; backend errors are translatable exceptions"
  rule: >
    User-visible text resolves through the translation catalogue (reuse
    existing keys before minting new ones). Backend user-facing errors are
    translatable exception types carrying a message key — not sprintf'd
    English.
  why: >
    Hardcoded strings can't be localized and fork per call site; translatable
    exceptions keep the boundary uniform.
  adapted_from: "PHP-I18N-001"
  applies_to:
    - "{src}/**/*.php"
    - "templates/**/*.twig"
  detect:
    - "literal user-facing strings in controllers/templates"
    - "user-facing exceptions built with sprintf/string concat"
  fix: >
    Move the string to the translation catalogue and reference the key; throw
    the translatable exception type.
  autofix: structural
  acceptance:
    - "GIVEN user-facing text THEN it resolves from the translation catalogue"
  validate:
    - "review: no hardcoded user-facing strings or sprintf'd user-facing exceptions in the diff"
  validate_kind: review
  phase: cross-cutting

# PHP-TYPE-003 is the Symfony-monorepo MIXED counterpart of the generic
# php-pack PHP-TYPE-001 (review): same UUID-type intent, enforced with a
# falsifiable grep signal AND a `make stan`/PHPStan machine validate
# (validate_kind: mixed, not purely automated — PHPStan is a type analyzer
# and this is the catalogue's sole type rule). It carries a distinct id because the falsifiability
# selftest (go test ./cmd/tmux-cli) enforces GLOBAL id-uniqueness across every
# pack, and the php pack already owns PHP-TYPE-001/002.
- id: PHP-TYPE-003
  category: types
  scope: generic
  severity: should
  title: "Use real UUID types end-to-end (automated + stan) — no asserted UUID strings"
  rule: >
    Where a value is a UUID, type it as a UUID value object (e.g. UuidInterface)
    rather than a string guarded by an assert. Apply it consistently: the getter,
    the actions that consume it, and (where applicable) the frontend.
  why: >
    A UUID type makes the contract explicit, removes scattered asserts, and pairs
    with Doctrine's binary UUID mapping (see PHP-PERS-002).
  adapted_from: "PHP-TYPE-001"
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "Assert::uuid(...) or the attribute #[Assert\\Uuid] guarding a value then typed/passed as a string"
    - "a *Id/*Uuid property or param holding a UUID but typed string instead of a UUID value object"
  fix: >
    Replace the asserted string with the project UUID value object across the
    getter, the consuming actions, and the frontend type.
  autofix: structural
  acceptance:
    - "GIVEN a UUID value THEN it is typed as a UUID value object, not an asserted string"
  validate:
    - "vendor/bin/phpstan analyse"
    - "No `Assert\\Uuid` / `Assert::uuid` remains where a UUID type fits on the changed UUID paths — grep returns nothing"
  validate_kind: mixed
  phase: domain
  signal: 'Assert\\Uuid|Assert::uuid'
  examples:
    bad: '#[Assert\Uuid] public readonly string $threadId;'
    good: 'public readonly UuidInterface $threadId;'

- id: PHP-ARCH-007
  category: architecture
  scope: generic
  severity: must
  title: "Respect package/context boundaries — no upward-layer or cross-context-internal dependency"
  rule: >
    A package depends only in the allowed direction. Within a context the layers
    go Domain ← Application ← Bundle ← app (a lower layer never imports a higher
    one); across packages a context never reaches into another context's internal
    Domain/Application — only its shared-kernel contracts. deptrac enforces both
    the layer direction and the package edges.
  why: >
    The package/layer graph is the architecture; an upward or cross-internal edge
    couples what must stay independently buildable and deployable.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a lower layer importing a higher layer (Domain using Application/Bundle)"
    - "a package importing another package's internal namespace, not its contract"
  fix: >
    Invert the dependency (inject an interface owned by the lower layer) or route
    the cross-package call through a shared-kernel contract; rerun deptrac.
  autofix: structural
  acceptance:
    - "GIVEN the changed packages THEN deptrac reports no layer or package-boundary violation"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: changed code respects package/context boundaries (no upward layer or cross-context-internal dependency)"
  validate_kind: mixed
  phase: architecture

- id: PHP-ARCH-008
  category: architecture
  scope: generic
  severity: must
  title: "No import or injection of another context's concrete Domain/Application class"
  rule: >
    A context never imports, injects, or instantiates another context's concrete
    Domain or Application class. Cross-context collaboration goes through a
    published contract from the shared kernel (see PHP-ARCH-009), so the foreign
    context's internals stay private and replaceable.
  why: >
    A concrete cross-context import welds two contexts together; the next refactor
    in one breaks the other, defeating the bounded-context split.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a use/import of another context's concrete Domain/Application namespace"
    - "constructor injection typed to a foreign context's concrete service"
  fix: >
    Depend on the foreign context's shared-kernel contract interface and inject
    that instead of the concrete class.
  autofix: structural
  acceptance:
    - "GIVEN a cross-context dependency THEN it targets a shared contract, not a foreign concrete class"
  validate:
    - "vendor/bin/deptrac analyse"
    - "review: no import/inject of another context's concrete Domain/Application class"
  validate_kind: mixed
  phase: architecture

- id: PHP-ARCH-009
  category: architecture
  scope: generic
  severity: should
  title: "Cross-context reads go through a published query contract, not a foreign service"
  rule: >
    When one context needs another context's data, it consumes a published
    XxxQueryContract/XxxContract from the shared kernel (contexts/previo/src) and
    receives contract-typed result objects — never a foreign concrete query
    service or DTO.
  why: >
    Reading through the contract keeps the consumer decoupled from the producer's
    internal shape; the producer can change its query service without a ripple.
  applies_to:
    - "{src}/**/*.php"
  detect:
    - "a consumer context typing against a foreign concrete query service or result DTO"
  fix: >
    Inject the shared XxxQueryContract; type results as the XxxContract interface.
  autofix: structural
  acceptance:
    - "GIVEN a cross-context read THEN it flows through a published query contract, not a foreign service"
  validate:
    - "review: cross-context reads go through a published XxxQueryContract/XxxContract, not a foreign concrete service"
  validate_kind: review
  phase: architecture

- id: PHP-PERS-005
  category: persistence
  scope: generic
  severity: should
  title: "DAO references a foreign aggregate by typed Id + #[PersistentReference], not a concrete entity"
  rule: >
    An AggregateData DAO that needs another aggregate holds that aggregate's typed
    Id and a #[PersistentReference] back-reference — it never maps a concrete
    foreign entity association. Child collections of the same aggregate stay as a
    mapped Collection<> on the DAO.
  why: >
    A direct foreign-entity association leaks one aggregate's persistence into
    another and breaks aggregate boundaries; the typed Id + #[PersistentReference]
    seam keeps each aggregate independently loadable.
  applies_to:
    - "{src}/**/*Data.php"
    - "{src}/Domain/**/*.php"
  detect:
    - "an AggregateData DAO mapping a concrete foreign aggregate entity association"
    - "a back-reference to a parent aggregate without #[PersistentReference]"
  fix: >
    Replace the foreign-entity association with the aggregate's typed Id and a
    #[PersistentReference] back-reference.
  autofix: structural
  acceptance:
    - "GIVEN an AggregateData DAO THEN foreign aggregates are referenced by typed Id + #[PersistentReference], not concrete entities"
  validate:
    - "review: an AggregateData DAO references a foreign aggregate by its typed Id + #[PersistentReference], not a concrete foreign entity"
  validate_kind: review
  phase: domain
- id: PHP-MONO-001
  category: scaffold
  scope: generic
  severity: must
  title: "Every component manifest validates against composer p2:mono-schema"
  rule: >
    Every P2 component (contexts/<bc>, contexts/previo, projects/<app>,
    packages/<pkg>) carries a monorepo-component.json that passes
    composer p2:mono-schema. Whenever a component dir or its
    monorepo-component.json is created or changed, the schema check runs and
    must exit 0.
  why: >
    P2 requires every component to carry a valid monorepo-component.json; an
    unvalidated manifest scaffolds a component the monorepo tooling cannot wire,
    surfacing only later as a build/runtime break.
  applies_to:
    - "**/monorepo-component.json"
    - "contexts/*/composer.json"
    - "projects/*/composer.json"
    - "packages/*/composer.json"
  detect:
    - "a new or changed monorepo-component.json"
    - "a new component dir whose manifest has not been schema-checked"
  fix: >
    Run composer p2:mono-schema and fix the manifest until it exits 0.
  autofix: none
  acceptance:
    - "GIVEN a new or changed monorepo-component.json THEN composer p2:mono-schema exits 0"
    - "GIVEN a new component dir THEN it carries a monorepo-component.json that passes composer p2:mono-schema"
  validate:
    - "composer p2:mono-schema"
    - "review: every new/changed component dir carries a monorepo-component.json and composer p2:mono-schema exits 0"
  validate_kind: mixed
  phase: scaffold
