# Pack: php-symfony — DDD-monorepo persistence rules (category: persistence).
# Loaded only for architecture=ddd (see ../manifest.yaml). The persistence
# rules every Symfony profile shares (mapped entities, binary UUIDs, DBAL
# types, JSON-blob ban, FK-less index coverage, migration hygiene) live in
# ../php-symfony-common/persistence.yaml.
#
# This file carries the aggregate-boundary seams (DAO/DTO triad, typed-Id
# references) plus the two hard house policies of the full-grade DDD profile:
# NO database foreign keys (PHP-PERS-009) and Doctrine PHP mapping files owned
# by the infra layer (PHP-PERS-010).
#
# Path globs use the {src}/{infra} discovery tokens (see ../SCHEMA.md).

- id: PHP-PERS-005
  category: persistence
  scope: generic
  severity: must
  title: "DAO references a foreign aggregate by typed Id + #[PersistentReference], not a concrete entity"
  rule: >
    An AggregateData DAO that needs another aggregate holds that aggregate's typed
    Id and a #[PersistentReference] back-reference — it never maps a concrete
    foreign entity association. Child collections of the same aggregate stay as a
    mapped Collection<> on the DAO.
  why: >
    A direct foreign-entity association leaks one aggregate's persistence into
    another and breaks aggregate boundaries; the typed Id + #[PersistentReference]
    seam keeps each aggregate independently loadable.
  applies_to:
    - "{src}/**/*Data.php"
    - "{src}/Domain/**/*.php"
  detect:
    - "an AggregateData DAO mapping a concrete foreign aggregate entity association"
    - "a back-reference to a parent aggregate without #[PersistentReference]"
  fix: >
    Replace the foreign-entity association with the aggregate's typed Id and a
    #[PersistentReference] back-reference.
  autofix: structural
  acceptance:
    - "GIVEN an AggregateData DAO THEN foreign aggregates are referenced by typed Id + #[PersistentReference], not concrete entities"
  validate:
    - "review: an AggregateData DAO references a foreign aggregate by its typed Id + #[PersistentReference], not a concrete foreign entity"
  validate_kind: review
  phase: domain

- id: PHP-PERS-007
  category: persistence
  scope: generic
  severity: must
  title: "Split the aggregate's mutable persistence-DAO from its readonly input/output DTO; expose children as DTOs"
  rule: >
    An aggregate keeps two distinct types: a mutable persistence-DAO (the
    ORM-mapped carrier of stored state) and a readonly input/output DTO (the
    value object crossing the aggregate boundary in/out). One type never plays
    both roles — the mutable carrier is not handed out as the readonly input or
    output object. Child entities of the aggregate are exposed only as DTOs,
    never returned whole. The roles are what matter; the common suffixes
    *Data (persistence-DAO) and *DTO (readonly-DTO) are illustrative examples,
    not required names.
  why: >
    Keeping the mutable persistence carrier separate from the readonly
    input/output value object preserves aggregate encapsulation: callers read
    and submit an immutable shape while the ORM-mapped state stays internal.
    Returning a child entity whole leaks the aggregate's mutable internals
    across its boundary, letting outside code mutate persisted state behind the
    aggregate's back.
  depends_on_rules:
    - "PHP-PERS-005"
  applies_to:
    - "{src}/**/*Data.php"
    - "{src}/Domain/**/*.php"
  detect:
    - "an aggregate whose mutable persistence-DAO doubles as its readonly input/output object (no distinct readonly DTO)"
    - "an aggregate exposing or returning a child entity whole instead of a readonly DTO"
  fix: >
    Introduce a distinct readonly input/output DTO for the aggregate and expose
    every child entity as a DTO; keep the mutable persistence-DAO internal to
    the aggregate.
  autofix: structural
  acceptance:
    - "GIVEN an aggregate THEN its mutable persistence-DAO and its readonly input/output DTO are distinct types, neither doubling as the other"
    - "GIVEN an aggregate with child entities THEN those children are exposed only via readonly DTOs, never returned whole"
  validate:
    - "review: the aggregate's mutable persistence-DAO (ORM carrier) and its readonly input/output DTO are distinct types, identified by role rather than by *Data/*DTO suffix"
    - "review: child entities of the aggregate are exposed only as DTOs in the diff, never returned whole"
    - "review: a Domain aggregate holds its state in a #[AggregateDAO] <X>Data DAO exposed as a readonly <X>DTO (getData(): <X>DTO), not loose VO/scalar properties promoted into the aggregate"
  validate_kind: mixed
  phase: domain
  signal: '(private|protected)\s+(readonly\s+)?[A-Z][A-Za-z0-9]*(Address|Email|Name|Status|Money|Price|Amount|Quantity|Phone|Period)\s+\$'
  examples:
    bad: 'private EmailAddress $email, private FullName $fullName, private UserStatus $status'
    good: 'private readonly UserId $id, #[AggregateDAO] private readonly UserData $data'

- id: PHP-PERS-008
  category: persistence
  scope: generic
  severity: must
  title: "A shared aggregate Id lives under its owning module, not a flat DataType/ root"
  rule: >
    A shared aggregate identifier (e.g. <X>Id) lives under the bounded module that
    OWNS the aggregate — {src}/Domain/<Module>/<X>Id.php — alongside the aggregate,
    its #[AggregateDAO] <X>Data DAO and readonly <X>DTO. It is NOT parked in a flat
    cross-cutting {src}/DataType/ root that pools every aggregate's Ids together and
    erases module ownership. The suffix *Id is the illustrative shared-identifier
    name; the location is what this rule enforces.
  why: >
    A flat DataType/ root holding every aggregate's Id severs the identifier from the
    module that owns its concept, inviting cross-module coupling and obscuring which
    aggregate an Id belongs to. Co-locating the Id with its aggregate keeps the
    module a self-contained ownership unit and the dependency direction explicit.
  applies_to:
    - "{src}/DataType/**/*Id.php"
  detect:
    - "a shared aggregate Id class defined under a flat {src}/DataType/ root instead of {src}/Domain/<Module>/"
    - "an <X>Id pooled in a cross-cutting DataType/ directory, detached from the aggregate that owns it"
  fix: >
    Move the <X>Id class into the owning module at {src}/Domain/<Module>/<X>Id.php,
    beside its aggregate, #[AggregateDAO] <X>Data DAO and readonly <X>DTO.
  autofix: structural
  acceptance:
    - "GIVEN a shared aggregate Id THEN it resides under {src}/Domain/<Module>/, not a flat DataType/ root"
  validate:
    - "review: a shared aggregate Id lives under {src}/Domain/<Module>/<X>Id.php beside its aggregate, not a flat {src}/DataType/ root"
  validate_kind: mixed
  phase: domain
  signal: '(final\s+)?class\s+[A-Z][A-Za-z0-9]*Id\b'
  examples:
    bad: 'final class UserId extends AbstractIntId'
    good: 'final class UserData extends AbstractData'

- id: PHP-PERS-009
  category: persistence
  scope: generic
  severity: must
  title: "No database foreign keys — relations are typed-Id columns with covering indexes"
  rule: >
    The schema declares NO foreign-key constraints. A relation is a typed-Id
    column (binary UUID or integer id, mapped via its custom DBAL type) plus a
    covering index declared in the same migration (PHP-PERS-006); referential
    consistency is owned by the aggregate and its repository, never delegated to
    the database. Migrations therefore never call addForeignKey /
    addForeignKeyConstraint and never emit FOREIGN KEY / REFERENCES SQL.
  why: >
    DB foreign keys couple aggregate lifecycles at the storage layer: they force
    delete/insert ordering across aggregates, deadlock under concurrent writes,
    block table maintenance and sharding, and duplicate an invariant the domain
    layer must own anyway. Dropping them is only safe as a POLICY — uniformly,
    with the index coverage and repository-owned consistency this pack's sibling
    rules mandate — which is why the ban is enforced, not optional.
  depends_on_rules:
    - "PHP-PERS-006"
  applies_to:
    - "**/migrations/**/*.php"
    - "{src}/{infra}/**/*.php"
  detect:
    - "a migration calling addForeignKey / addForeignKeyConstraint"
    - "raw FOREIGN KEY / REFERENCES DDL in a migration or infra-layer SQL string"
  fix: >
    Drop the FK constraint; keep the relation as a typed-Id column and declare a
    covering index on it in the same migration (see PHP-PERS-006). Enforce the
    referential invariant in the owning aggregate/repository.
  autofix: structural
  acceptance:
    - "GIVEN a new or changed migration THEN it declares no foreign-key constraint (no addForeignKey, no FOREIGN KEY/REFERENCES DDL)"
    - "GIVEN a relation column THEN it is a typed-Id column with a covering index, its consistency owned by the aggregate/repository"
  validate:
    - "review: no foreign-key constraint enters the schema in the diff; every relation column is a typed-Id column with a covering index in the same migration"
  validate_kind: mixed
  phase: domain
  signal: 'addForeignKey(Constraint)?\s*\(|FOREIGN\s+KEY|\sREFERENCES\s'
  examples:
    bad: "$table->addForeignKey('reservationId', 'reservation', 'id');"
    good: "$table->addIndex(['reservationId']);"

- id: PHP-PERS-010
  category: persistence
  scope: generic
  severity: must
  title: "Doctrine mapping lives in infra-layer PHP mapping files — domain classes carry no ORM attributes"
  rule: >
    Entities are mapped through PHP mapping files owned by the infrastructure
    layer ({src}/{infra}/Persistence/Doctrine/Mapping/, one file per entity,
    receiving ClassMetadata and calling mapField/mapEmbedded), registered via a
    central PHP-mapping driver. Domain and Application classes carry NO
    #[ORM\...] attributes and no Doctrine\ORM\Mapping import — the mapping is
    infrastructure, so it lives with the infrastructure.
  why: >
    ORM attributes weld persistence metadata onto the domain model: every schema
    concern edits a Domain file, the layer contract (PHP-ARCH-019) breaks, and the
    entity cannot be re-mapped per storage without touching business code. A PHP
    mapping file in the infra layer keeps the domain pure and the mapping
    reviewable next to the DBAL types and repositories that use it.
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/Domain/**/*.php"
    - "{src}/**/Application/**/*.php"
  detect:
    - "an #[ORM\\...] attribute or use Doctrine\\ORM\\Mapping import on a Domain/Application class"
    - "entity mapping declared anywhere but the infra layer's PHP mapping files"
  fix: >
    Delete the ORM attributes from the domain class and author the equivalent PHP
    mapping file under {src}/{infra}/Persistence/Doctrine/Mapping/; register it
    with the pack's PHP-mapping driver.
  autofix: structural
  acceptance:
    - "GIVEN a Domain or Application class THEN it carries no ORM attribute; its mapping lives in an infra-layer PHP mapping file"
  validate:
    - "review: changed entities are mapped via infra-layer PHP mapping files; no ORM attributes on Domain/Application classes, and the project's resolved DB-schema validator stays green"
  validate_kind: mixed
  phase: domain
  signal: '#\[ORM\\|use\s+Doctrine\\ORM\\Mapping'
  examples:
    bad: '#[ORM\Entity] final class Reservation'
    good: '$metadata->mapField([''fieldName'' => ''reservationId'', ''type'' => ReservationIdType::NAME]);'
