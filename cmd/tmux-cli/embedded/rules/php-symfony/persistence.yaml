# Pack: php-symfony — persistence rules (category: persistence).
# Split per-category from the former code-rules.yaml monolith. See ../SCHEMA.md.
#
# Path globs use the {src}/{infra} discovery tokens (see ../SCHEMA.md): {src}
# expands to every resolved source root, {infra} to the infra-layer directory
# name. For the P2 monorepo topology a `## Layers` doc resolves {src} to
# contexts/*/src, contexts/*/app/src, projects/*/src, packages/*/src and {infra}
# to Bundle. Tokenizing COLLAPSES the former context-vs-project glob distinction
# (contexts/*/src/**/*Handler.php and projects/*/src/... both become {src}/...);
# this is intentional — the goal is portability (rules match the real tree), and
# deptrac remains the authoritative boundary enforcer for the mixed rules.

- id: PHP-PERS-001
  category: persistence
  scope: generic
  severity: must
  title: "Persist via Doctrine entities, not raw array repositories"
  rule: >
    Persistence goes through mapped Doctrine entities. No repositories that
    read/write associative arrays against hand-written SQL for domain state.
  why: >
    Mapped entities carry types, identity, and migrations; array bags carry
    typos.
  adapted_from: "PHP-PERS-001"
  applies_to:
    - "{src}/{infra}/**/*.php"
    - "{src}/**/*Repository.php"
  detect:
    - "repositories returning/accepting associative arrays for domain state"
  fix: >
    Map the entity and rewrite the repository against it.
  autofix: structural
  acceptance:
    - "GIVEN domain persistence THEN it uses mapped Doctrine entities"
  validate:
    - "review: changed repositories operate on mapped entities, not raw arrays, and the project's resolved DB-schema validator (e.g. P2 `composer p2:db-validate`) stays green"
  validate_kind: review
  phase: domain

- id: PHP-PERS-002
  category: persistence
  scope: generic
  severity: should
  title: "Map UUID columns as binary UUID, not string"
  rule: >
    UUID columns use the binary UUID Doctrine type (e.g. uuid/binaryUuid per
    the project's Doctrine stack), not VARCHAR(36).
  why: >
    Binary UUIDs are 16 bytes with index-friendly ordering; string UUIDs bloat
    indexes.
  adapted_from: "PHP-PERS-002"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/{infra}/**/*.php"
    - "{src}/Domain/**/*.php"
    - "{src}/**/Entity/**/*.php"
  detect:
    - "ORM column type string/varchar holding UUIDs"
  fix: >
    Switch the column mapping to the UUID type and migrate.
  autofix: structural
  acceptance:
    - "GIVEN a UUID column THEN its Doctrine type is the binary UUID type"
  validate:
    - "review: new UUID columns in the diff use the uuid Doctrine type, and the project's resolved DB-schema validator (e.g. P2 `composer p2:db-validate`) stays green"
  validate_kind: review
  phase: domain

- id: PHP-PERS-003
  category: persistence
  scope: generic
  severity: must
  title: "Model collections as their own entity/table, not a JSON blob"
  rule: >
    A collection of structured child records (messages of a thread, items of
    an order) is its own mapped entity with a relation — never a JSON column
    on the parent.
  why: >
    JSON blobs can't be queried, indexed, migrated, or constrained; they decay
    into schema-less mud.
  adapted_from: "PHP-PERS-003"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/Domain/**/*.php"
    - "{src}/{infra}/**/*.php"
  detect:
    - "json ORM column holding an array of structured records"
  fix: >
    Extract the child entity + relation; migrate the blob.
  autofix: structural
  acceptance:
    - "GIVEN a structured collection THEN it is a mapped child entity, not a JSON column"
  validate:
    - "review: no new JSON columns holding structured collections in the diff, and the project's resolved DB-schema validator (e.g. P2 `composer p2:db-validate`) stays green"
  validate_kind: review
  phase: domain

- id: PHP-PERS-004
  category: persistence
  scope: generic
  severity: should
  title: "Map enum/value columns with a dedicated custom Doctrine DBAL type"
  rule: >
    Enum and value-object columns get a custom DBAL type that converts to/from
    the PHP type — not string columns converted ad hoc at every read site.
  why: >
    The DBAL type converts once, centrally; ad-hoc conversion scatters and
    drifts.
  adapted_from: "PHP-PERS-004"
  depends_on_rules:
    - "PHP-PERS-001"
  applies_to:
    - "{src}/{infra}/**/*.php"
  detect:
    - "string columns + manual from()/value conversions around enum fields"
  fix: >
    Add a custom DBAL type and map the column with it.
  autofix: structural
  acceptance:
    - "GIVEN an enum/VO column THEN a custom DBAL type owns the conversion"
  validate:
    - "review: new enum/VO columns in the diff are mapped via custom DBAL types, and the project's resolved DB-schema validator (e.g. P2 `composer p2:db-validate`) stays green"
  validate_kind: review
  phase: domain

- id: PHP-PERS-005
  category: persistence
  scope: generic
  severity: must
  title: "DAO references a foreign aggregate by typed Id + #[PersistentReference], not a concrete entity"
  rule: >
    An AggregateData DAO that needs another aggregate holds that aggregate's typed
    Id and a #[PersistentReference] back-reference — it never maps a concrete
    foreign entity association. Child collections of the same aggregate stay as a
    mapped Collection<> on the DAO.
  why: >
    A direct foreign-entity association leaks one aggregate's persistence into
    another and breaks aggregate boundaries; the typed Id + #[PersistentReference]
    seam keeps each aggregate independently loadable.
  applies_to:
    - "{src}/**/*Data.php"
    - "{src}/Domain/**/*.php"
  detect:
    - "an AggregateData DAO mapping a concrete foreign aggregate entity association"
    - "a back-reference to a parent aggregate without #[PersistentReference]"
  fix: >
    Replace the foreign-entity association with the aggregate's typed Id and a
    #[PersistentReference] back-reference.
  autofix: structural
  acceptance:
    - "GIVEN an AggregateData DAO THEN foreign aggregates are referenced by typed Id + #[PersistentReference], not concrete entities"
  validate:
    - "review: an AggregateData DAO references a foreign aggregate by its typed Id + #[PersistentReference], not a concrete foreign entity"
  validate_kind: review
  phase: domain

- id: PHP-PERS-006
  category: persistence
  scope: generic
  severity: should
  title: "Cover every FK-less relation/foreign-id column with an explicit index"
  rule: >
    In a project that does not use database foreign keys, every relation /
    foreign-id column — a typed aggregate Id paired with a #[PersistentReference]
    back-reference, or any join column pointing at another table without an FK
    constraint — carries an explicit covering index, declared in the migration
    that creates or alters the column. A column governed by a real DB foreign key
    is exempt: the foreign key already creates that index.
  why: >
    PHP-PERS-005 references a foreign aggregate by a typed Id + #[PersistentReference]
    instead of a mapped foreign-entity association, so the schema has no foreign-key
    constraint on that id column. A foreign key would auto-create the backing index;
    without one, nothing guarantees the column is indexed and every join or filter on
    it table-scans. The covering index restores the lookup performance the missing FK
    would otherwise have provided.
  depends_on_rules:
    - "PHP-PERS-005"
  applies_to:
    - "**/migrations/**/*.php"
    - "{src}/{infra}/**/*.php"
    - "{src}/**/*Data.php"
  detect:
    - "a relation/foreign-id column (a typed Id + #[PersistentReference], or any FK-less join column) created or altered in a migration with no covering index on it"
    - "a foreign-id column carrying neither a DB foreign-key constraint nor a covering index"
  fix: >
    Add a covering index on the relation/foreign-id column in the migration that
    creates or alters it (an index line naming that column). In a project that does
    use DB foreign keys, add the foreign-key constraint instead — it creates the
    index and this rule no longer applies.
  autofix: structural
  acceptance:
    - "GIVEN a project with no DB foreign keys, WHEN a relation/foreign-id column is added or altered, THEN a covering index on that column is declared in the same migration"
    - "GIVEN a column governed by a DB foreign-key constraint THEN the rule is inert — the foreign key already provides the index"
  validate:
    - "review: every FK-less relation/foreign-id column added or altered in the diff has a covering index declared in its migration"
    - "review: the rule stays inert where a DB foreign-key constraint governs the column — no covering-index demand on FK-backed columns"
  validate_kind: review
  phase: domain

- id: PHP-PERS-007
  category: persistence
  scope: generic
  severity: must
  title: "Split the aggregate's mutable persistence-DAO from its readonly input/output DTO; expose children as DTOs"
  rule: >
    An aggregate keeps two distinct types: a mutable persistence-DAO (the
    ORM-mapped carrier of stored state) and a readonly input/output DTO (the
    value object crossing the aggregate boundary in/out). One type never plays
    both roles — the mutable carrier is not handed out as the readonly input or
    output object. Child entities of the aggregate are exposed only as DTOs,
    never returned whole. The roles are what matter; the common suffixes
    *Data (persistence-DAO) and *DTO (readonly-DTO) are illustrative examples,
    not required names.
  why: >
    Keeping the mutable persistence carrier separate from the readonly
    input/output value object preserves aggregate encapsulation: callers read
    and submit an immutable shape while the ORM-mapped state stays internal.
    Returning a child entity whole leaks the aggregate's mutable internals
    across its boundary, letting outside code mutate persisted state behind the
    aggregate's back.
  depends_on_rules:
    - "PHP-PERS-005"
  applies_to:
    - "{src}/**/*Data.php"
    - "{src}/Domain/**/*.php"
  detect:
    - "an aggregate whose mutable persistence-DAO doubles as its readonly input/output object (no distinct readonly DTO)"
    - "an aggregate exposing or returning a child entity whole instead of a readonly DTO"
  fix: >
    Introduce a distinct readonly input/output DTO for the aggregate and expose
    every child entity as a DTO; keep the mutable persistence-DAO internal to
    the aggregate.
  autofix: structural
  acceptance:
    - "GIVEN an aggregate THEN its mutable persistence-DAO and its readonly input/output DTO are distinct types, neither doubling as the other"
    - "GIVEN an aggregate with child entities THEN those children are exposed only via readonly DTOs, never returned whole"
  validate:
    - "review: the aggregate's mutable persistence-DAO (ORM carrier) and its readonly input/output DTO are distinct types, identified by role rather than by *Data/*DTO suffix"
    - "review: child entities of the aggregate are exposed only as DTOs in the diff, never returned whole"
    - "review: a Domain aggregate holds its state in a #[AggregateDAO] <X>Data DAO exposed as a readonly <X>DTO (getData(): <X>DTO), not loose VO/scalar properties promoted into the aggregate"
  validate_kind: mixed
  phase: domain
  signal: '(private|protected)\s+(readonly\s+)?[A-Z][A-Za-z0-9]*(Address|Email|Name|Status|Money|Price|Amount|Quantity|Phone|Period)\s+\$'
  examples:
    bad: 'private EmailAddress $email, private FullName $fullName, private UserStatus $status'
    good: 'private readonly UserId $id, #[AggregateDAO] private readonly UserData $data'

- id: PHP-PERS-008
  category: persistence
  scope: generic
  severity: must
  title: "A shared aggregate Id lives under its owning module, not a flat DataType/ root"
  rule: >
    A shared aggregate identifier (e.g. <X>Id) lives under the bounded module that
    OWNS the aggregate — {src}/Domain/<Module>/<X>Id.php — alongside the aggregate,
    its #[AggregateDAO] <X>Data DAO and readonly <X>DTO. It is NOT parked in a flat
    cross-cutting {src}/DataType/ root that pools every aggregate's Ids together and
    erases module ownership. The suffix *Id is the illustrative shared-identifier
    name; the location is what this rule enforces.
  why: >
    A flat DataType/ root holding every aggregate's Id severs the identifier from the
    module that owns its concept, inviting cross-module coupling and obscuring which
    aggregate an Id belongs to. Co-locating the Id with its aggregate keeps the
    module a self-contained ownership unit and the dependency direction explicit.
  applies_to:
    - "{src}/DataType/**/*Id.php"
  detect:
    - "a shared aggregate Id class defined under a flat {src}/DataType/ root instead of {src}/Domain/<Module>/"
    - "an <X>Id pooled in a cross-cutting DataType/ directory, detached from the aggregate that owns it"
  fix: >
    Move the <X>Id class into the owning module at {src}/Domain/<Module>/<X>Id.php,
    beside its aggregate, #[AggregateDAO] <X>Data DAO and readonly <X>DTO.
  autofix: structural
  acceptance:
    - "GIVEN a shared aggregate Id THEN it resides under {src}/Domain/<Module>/, not a flat DataType/ root"
  validate:
    - "review: a shared aggregate Id lives under {src}/Domain/<Module>/<X>Id.php beside its aggregate, not a flat {src}/DataType/ root"
  validate_kind: mixed
  phase: domain
  signal: '(final\s+)?class\s+[A-Z][A-Za-z0-9]*Id\b'
  examples:
    bad: 'final class UserId extends AbstractIntId'
    good: 'final class UserData extends AbstractData'
