# Pack: php-symfony — scaffold rules (category: scaffold).
# Split per-category from the former code-rules.yaml monolith. See ../SCHEMA.md.
#
# PHP-MONO-001's component-manifest globs stay LITERAL (no {src}/{infra}
# source-root semantics) — they match composer/monorepo-component.json paths.

- id: PHP-MONO-001
  category: scaffold
  scope: generic
  severity: must
  title: "Every component manifest validates against composer p2:mono-schema"
  rule: >
    Every P2 component (contexts/<bc>, contexts/previo, projects/<app>,
    packages/<pkg>) carries a monorepo-component.json that passes
    composer p2:mono-schema. Whenever a component dir or its
    monorepo-component.json is created or changed, the schema check runs and
    must exit 0.
  why: >
    P2 requires every component to carry a valid monorepo-component.json; an
    unvalidated manifest scaffolds a component the monorepo tooling cannot wire,
    surfacing only later as a build/runtime break.
  applies_to:
    - "**/monorepo-component.json"
    - "contexts/*/composer.json"
    - "projects/*/composer.json"
    - "packages/*/composer.json"
  detect:
    - "a new or changed monorepo-component.json"
    - "a new component dir whose manifest has not been schema-checked"
  fix: >
    Run composer p2:mono-schema and fix the manifest until it exits 0.
  autofix: none
  acceptance:
    - "GIVEN a new or changed monorepo-component.json THEN composer p2:mono-schema exits 0"
    - "GIVEN a new component dir THEN it carries a monorepo-component.json that passes composer p2:mono-schema"
  validate:
    - "composer p2:mono-schema"
    - "review: every new/changed component dir carries a monorepo-component.json and composer p2:mono-schema exits 0"
  validate_kind: mixed
  phase: scaffold
