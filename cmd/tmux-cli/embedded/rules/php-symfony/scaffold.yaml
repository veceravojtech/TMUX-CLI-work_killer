# Pack: php-symfony — scaffold rules (category: scaffold).
# Split per-category from the former code-rules.yaml monolith. See ../SCHEMA.md.
#
# PHP-MONO-001's component-manifest globs stay LITERAL (no {src}/{infra}
# source-root semantics) — they match composer/monorepo-component.json paths.

- id: PHP-MONO-001
  category: scaffold
  scope: generic
  severity: must
  title: "Every monorepo component manifest passes the resolved manifest-schema validator"
  rule: >
    In a multi-component monorepo, every component (a bounded context, the
    shared kernel, a deployable, a shared package) carries a component manifest
    that passes the monorepo's resolved manifest-schema validator (e.g. P2's
    `monorepo-component.json` validated by `composer p2:mono-schema`). Whenever a
    component dir or its manifest is created or changed, the schema check runs and
    must exit 0.
  why: >
    A monorepo requires every component to carry a valid manifest; an unvalidated
    manifest scaffolds a component the monorepo tooling cannot wire, surfacing
    only later as a build/runtime break.
  applies_to:
    - "**/monorepo-component.json"
    - "contexts/*/composer.json"
    - "projects/*/composer.json"
    - "packages/*/composer.json"
  detect:
    - "a new or changed component manifest (e.g. monorepo-component.json)"
    - "a new component dir whose manifest has not been schema-checked"
  fix: >
    Run the monorepo's resolved manifest-schema validator (e.g. P2
    `composer p2:mono-schema`) and fix the manifest until it exits 0.
  autofix: none
  acceptance:
    - "GIVEN a new or changed component manifest THEN the monorepo's resolved manifest-schema validator exits 0"
    - "GIVEN a new component dir THEN it carries a component manifest that passes the resolved manifest-schema validator"
  validate:
    - "review: every new/changed component dir carries a component manifest that passes the monorepo's resolved manifest-schema validator (e.g. P2 `composer p2:mono-schema`) — exits 0"
  validate_kind: review
  phase: scaffold
