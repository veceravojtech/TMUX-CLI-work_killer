- id: VUE-CONV-001
  category: structure
  scope: generic
  severity: should
  title: "Vue UI lives in .vue SFCs under assets/ with <script setup>"
  rule: >
    Author Vue UI as Single-File Components (.vue) under assets/ using
    <script setup> + the Composition API; keep component logic out of Twig.
  why: >
    A consistent SFC location and Composition-API style keeps the Vue surface
    discoverable and reviewable and stops logic leaking into server templates.
  applies_to:
    - "assets/**/*.vue"
  acceptance:
    - "GIVEN a Vue component THEN it is a .vue SFC under assets/ using <script setup>"
  validate:
    - "review: new Vue components are .vue SFCs under assets/ using <script setup>"
  validate_kind: review
  phase: frontend

- id: VUE-REUSE-001
  category: reuse
  scope: generic
  severity: should
  title: "Reuse an existing shared component before authoring a new one"
  rule: >
    Before authoring a new component, reuse an existing shared component
    (`reuse-existing-shared-component`) from `packages/ui/**` instead of
    duplicating an equivalent one.
  why: >
    Reusing the shared component library keeps UI behaviour and styling
    consistent and avoids divergent duplicates that drift apart over time.
  applies_to:
    - "packages/ui/**"
  acceptance:
    - "GIVEN a needed UI element WHEN an equivalent shared component exists THEN reuse it instead of duplicating it"
  validate:
    - "review: a new component duplicates an existing packages/ui/** shared component"
  validate_kind: review
  phase: frontend

- id: VUE-DATE-001
  category: consistency
  scope: generic
  severity: should
  title: "Format and parse dates through a single shared date helper"
  rule: >
    Format and parse dates through one shared date helper rather than ad-hoc
    inline formatting scattered across components.
  why: >
    A single date helper keeps locale, timezone, and format handling consistent
    and makes a format change a one-line edit instead of a codebase sweep.
  applies_to:
    - "assets/**/*.vue"
    - "packages/ui/**/*.vue"
  acceptance:
    - "GIVEN a date is rendered or parsed WHEN it is handled THEN it goes through the shared date helper, not inline formatting"
  validate:
    - "review: dates are formatted/parsed via the shared date helper, not inline"
  validate_kind: review
  phase: frontend

- id: VUE-PROP-001
  category: props
  scope: generic
  severity: should
  title: "Boolean props are is-prefixed and default to false"
  rule: >
    Name boolean props with an is/has/can prefix and default them to false; a
    literal :prop="true" or :prop="false" template binding is the violation —
    bind a boolean expression or omit the attribute instead.
  why: >
    Predictable boolean prop names and a false default make component APIs
    self-describing, and a literal true/false binding usually hides a prop that
    should be a real expression or simply left at its default.
  applies_to:
    - "assets/**/*.vue"
    - "packages/ui/**/*.vue"
  acceptance:
    - 'GIVEN a boolean prop WHEN it is bound in a template THEN it uses an expression, not a literal :prop="true"/"false"'
  validate:
    - 'grep -REn '':[A-Za-z-]+="(true|false)"'' packages/ui assets returns nothing'
  validate_kind: automated
  phase: frontend
  signal: ':[\w-]+="(?:true|false)"'
  examples:
    bad: '<UserCard :is-active="true" />'
    good: '<UserCard :is-active="isActive" />'

- id: VUE-SFC-001
  category: structure
  scope: generic
  severity: should
  title: "Order <script setup> as props, then emits, then logic"
  rule: >
    Inside <script setup>, declare props first, then emits, then the rest of
    the component logic, so every SFC reads in the same order.
  why: >
    A fixed declaration order makes a component's public contract (its props and
    emits) immediately visible at the top and keeps SFCs scannable in review.
  applies_to:
    - "assets/**/*.vue"
    - "packages/ui/**/*.vue"
  acceptance:
    - "GIVEN a <script setup> block THEN it declares props, then emits, then the remaining logic"
  validate:
    - "review: <script setup> declares props, then emits, then logic"
  validate_kind: review
  phase: frontend

- id: VUE-CSS-001
  category: styling
  scope: generic
  severity: should
  title: "Style with design-token CSS variables, not hard-coded literals"
  rule: >
    Style components with design-token CSS variables rather than hard-coded
    colour or size literals, so a token change propagates everywhere.
  why: >
    Design-token variables keep spacing and colour consistent across the UI and
    make theming a single-source change instead of a find-and-replace.
  applies_to:
    - "assets/**/*.vue"
    - "packages/ui/**/*.vue"
  acceptance:
    - "GIVEN a component style WHEN a colour or size is set THEN it references a design-token CSS variable, not a hard-coded literal"
  validate:
    - "review: styles use design-token CSS variables, not hard-coded colour/size literals"
  validate_kind: review
  phase: frontend

# VUE-GATE-001 is the vue pack's frontend MACHINE gate — the FE counterpart of
# the php-symfony make-stan/phpstan gate. mixed: a real toolchain run
# (make jsf = ESLint + Stylelint + vue-tsc + Vitest, plus the explicit commands
# it wraps) PLUS a review: line. It carries no signal — mixed needs only a
# review: line (cf. PHP-MONO-001). make jsf / vue-tsc / vitest / stylelint are
# NOT weakOnly, so the gate is a genuine machine check, not a borrowed run.
- id: VUE-GATE-001
  category: quality
  scope: generic
  severity: must
  title: "Changed *.vue/*.ts pass the FE machine gate (make jsf: ESLint+Stylelint+vue-tsc+Vitest)"
  rule: >
    A changed Vue SFC or TypeScript module must pass the frontend machine gate
    before it is done: run `make jsf` (the previo2_fe toolchain — ESLint +
    Stylelint + vue-tsc + Vitest), or the equivalent eslint + stylelint +
    vue-tsc + vitest run, scoped to the changed files/package. A lint or type
    error fails the gate.
  why: >
    Without a machine gate, Vue/TS changes get only rule-review and a lint or
    type error ships silently. Mirroring P2's required make jsf turns those
    errors red at implementation time instead of in CI or production.
  applies_to:
    - "assets/**/*.vue"
    - "assets/**/*.ts"
    - "packages/ui/**/*.vue"
    - "packages/ui/**/*.ts"
  acceptance:
    - "GIVEN a changed *.vue or *.ts file WHEN the FE gate runs THEN make jsf (eslint + stylelint + vue-tsc + vitest) exits 0 with no lint or type errors"
  validate:
    - "make jsf"
    - "vue-tsc --noEmit"
    - "vitest run"
    - "stylelint 'assets/**/*.{vue,ts,css}' 'packages/ui/**/*.{vue,ts,css}'"
    - "review: changed *.vue/*.ts pass make jsf (eslint, stylelint, vue-tsc, vitest) with zero lint/type errors"
  validate_kind: mixed
  phase: frontend
